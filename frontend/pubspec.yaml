name: edurim
description: "منصة Concouri التعليمية لطلاب موريتانيا"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.2
  web: ^1.1.1
  video_player: ^2.9.2
  video_player_web: ^2.4.0
  syncfusion_flutter_pdfviewer: ^28.2.12
  dio: ^5.7.0
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  open_filex: ^4.5.0
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Logo_EduRim.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_edurim.png
    - assets/Logo_EduRim.png
